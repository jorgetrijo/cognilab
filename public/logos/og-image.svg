<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6f1"/>
      <stop offset="100%" style="stop-color:#f3ede6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d03022"/>
      <stop offset="16%" style="stop-color:#ed6e40"/>
      <stop offset="33%" style="stop-color:#fece00"/>
      <stop offset="50%" style="stop-color:#11c4a1"/>
      <stop offset="66%" style="stop-color:#60bfe2"/>
      <stop offset="83%" style="stop-color:#907fe4"/>
      <stop offset="100%" style="stop-color:#f4729b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#11c4a1" opacity="0.07"/>
  <circle cx="1100" cy="530" r="250" fill="#907fe4" opacity="0.07"/>

  <!-- Rainbow accent bar top -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <!-- Logo placeholder area -->
  <image href="/logos/logo.svg" x="80" y="80" width="320" height="128"/>

  <!-- Divider line -->
  <rect x="80" y="240" width="80" height="5" rx="3" fill="#11c4a1"/>

  <!-- Tagline -->
  <text x="80" y="310" font-family="'Fredoka', 'Helvetica Neue', sans-serif" font-size="36" font-weight="600" fill="#660c9f">Psicología y psicopedagogía</text>
  <text x="80" y="360" font-family="'Fredoka', 'Helvetica Neue', sans-serif" font-size="36" font-weight="600" fill="#660c9f">para niños, adolescentes y familias</text>

  <!-- Description -->
  <text x="80" y="430" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="22" fill="#9b5fc0">Un equipo interdisciplinario que acompaña cada proceso</text>
  <text x="80" y="462" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="22" fill="#9b5fc0">con cercanía, compromiso y una mirada integral.</text>

  <!-- URL badge -->
  <rect x="80" y="520" width="280" height="50" rx="25" fill="#660c9f" opacity="0.1"/>
  <text x="220" y="551" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="20" fill="#660c9f" text-anchor="middle" font-weight="600">cognilab.com.ar</text>

  <!-- Rainbow accent bar bottom -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>
</svg>
